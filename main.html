<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdGPT - Choose Your Mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --black: #000000;
            --gray-1: #111111;
            --gray-2: #222222;
            --gray-3: #444444;
            --gray-4: #666666;
            --gray-5: #e0e0e0;
            --gray-6: #f5f5f5;
            --accent: #222222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background: var(--white);
            color: var(--black);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            flex: 1;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            padding: 20px 24px 40px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 40px;
        }

        .brand {
            text-align: center;
            margin-bottom: 20px;
        }

        .brand-logo {
            width: 160px;
            height: auto;
            margin-bottom: 24px;
            border-radius: 12px;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 15px;
            color: var(--gray-4);
            font-weight: 400;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .choice-card {
            position: relative;
            background: var(--white);
            border: 1px solid var(--gray-5);
            border-radius: 20px;
            padding: 32px 24px;
            text-decoration: none;
            color: var(--black);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
            cursor: pointer;
        }

        .choice-card:hover {
            border-color: var(--black);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        .choice-card.locked {
            background: var(--gray-6);
            border-color: var(--gray-5);
            cursor: not-allowed;
            opacity: 0.8;
        }

        .choice-card.locked:hover {
            transform: none;
            box-shadow: none;
            border-color: var(--gray-5);
        }

        .choice-icon {
            width: 48px;
            height: 48px;
            background: var(--black);
            color: var(--white);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }

        .choice-card.locked .choice-icon {
            background: var(--gray-4);
        }

        .choice-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .choice-desc {
            font-size: 14px;
            color: var(--gray-4);
            line-height: 1.6;
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 100px;
            background: var(--gray-5);
            color: var(--gray-2);
        }

        .badge.active {
            background: #e7f5ff;
            color: #1971c2;
        }

        .footer {
            padding: 32px;
            text-align: center;
            font-size: 12px;
            color: var(--gray-4);
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.2s;
        }

        .delay-3 {
            animation-delay: 0.3s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <main class="container">
        <div class="brand fade-in">
            <img src="/static/logo.jpeg" alt="Impact Nexus Logo" class="brand-logo">
            <p class="tagline">Next-generation brand growth engine</p>
        </div>

        <div class="choices">
            <!-- AI Question Mode -->
            <a href="/generator" class="choice-card fade-in delay-1">
                <span class="badge active">Ready</span>
                <div class="choice-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <h2 class="choice-title">AI Question Mode</h2>
                <p class="choice-desc">Generate high-performance ad assets through a structured MBA-level strategic
                    brief.</p>
            </a>

            <!-- Chatbot Mode -->
            <a href="/chatbot" class="choice-card fade-in delay-2">
                <span class="badge active">Ready</span>
                <div class="choice-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a10 10 0 1 0 10 10H12V2z"></path>
                        <path d="M12 12L2.1 12.1"></path>
                        <path d="M12 12V22.1"></path>
                    </svg>
                </div>
                <h2 class="choice-title">Chatbot Mode</h2>
                <p class="choice-desc">Converse naturally with our AI to brainstorm ideas and refine your brand identity
                    in real-time.</p>
            </a>
        </div>
    </main>

    <footer class="footer fade-in delay-3">
        Made By Team BotForgers
    </footer>

</body>

</html>
