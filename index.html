<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AdGPT · Ad Brief Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --surface: #f8f9fa;
  --card: #ffffff;
  --border: #e9ecef;
  --border-hover: #dee2e6;
  --text: #212529;
  --text-secondary: #6c757d;
  --text-muted: #adb5bd;
  --brand: #007bff;
  --brand-light: #e3f2fd;
  --success: #28a745;
  --success-light: #d4edda;
  --danger: #dc3545;
  --danger-light: #f8d7da;
  --warning: #ffc107;
  --warning-light: #fff3cd;
  --radius: 12px;
  --radius-lg: 16px;
  --shadow: 0 2px 8px rgba(0,0,0,0.1);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.15);
  --transition: all 0.2s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Topbar */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 64px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
  font-weight: 800;
  font-size: 22px;
  color: var(--text);
  text-decoration: none;
  letter-spacing: -0.5px;
  transition: var(--transition);
}

.logo:hover {
  transform: translateY(-2px);
}

.logo-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, #007bff 0%, #0056b3 50%, #004085 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 24px;
  font-weight: 700;
  box-shadow: 0 8px 24px rgba(0, 123, 255, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.2);
  position: relative;
  overflow: hidden;
}

.logo-icon::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 100%);
  pointer-events: none;
  border-radius: 14px;
}

.logo-icon svg {
  width: 28px;
  height: 28px;
  position: relative;
  z-index: 1;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-dot {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: var(--text-secondary);
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-weight: 500;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: var(--transition);
}

.dot.green { background: var(--success); }
.dot.red { background: var(--danger); }
.dot.orange { background: var(--warning); }

/* Layout */
.app {
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - 64px);
}

/* Main Panel */
.main {
  flex: 1;
  padding: 32px 20px;
  max-width: 600px;
  margin: 0 auto;
  width: 100%;
}

/* Progress */
.progress-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
}

.step-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  white-space: nowrap;
}

.progress-track {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: var(--surface);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--brand), #0056b3);
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

.pct-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  min-width: 40px;
  text-align: right;
}

/* Question Block */
.q-block {
  margin-bottom: 32px;
}

.q-tag {
  display: inline-flex;
  align-items: center;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--brand);
  padding: 6px 12px;
  border-radius: 16px;
  background: var(--brand-light);
  border: 1px solid rgba(0,123,255,0.2);
  margin-bottom: 16px;
}

.q-text {
  font-size: clamp(24px, 5vw, 36px);
  font-weight: 700;
  line-height: 1.2;
  color: var(--text);
  letter-spacing: -0.02em;
}

/* Options */
.options-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.opt-btn {
  appearance: none;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  text-align: left;
  cursor: pointer;
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  font-weight: 500;
  line-height: 1.4;
  transition: var(--transition);
  display: flex;
  align-items: flex-start;
  gap: 16px;
  min-height: 60px;
  box-shadow: var(--shadow);
}

.opt-btn:hover {
  border-color: var(--brand);
  background: var(--brand-light);
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}

.opt-btn.selected {
  border-color: var(--brand);
  background: var(--brand-light);
  box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
}

.opt-num {
  min-width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-secondary);
  flex-shrink: 0;
}

.opt-btn.selected .opt-num {
  background: var(--brand);
  color: white;
}

/* Custom Input */
.custom-row {
  display: flex;
  align-items: center;
  gap: 0;
  border-radius: var(--radius);
  border: 2px solid var(--border);
  background: var(--card);
  overflow: hidden;
  transition: var(--transition);
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}

.custom-row:focus-within {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
}

.custom-label {
  padding: 0 20px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  border-right: 1px solid var(--border);
  height: 60px;
  display: flex;
  align-items: center;
  background: var(--surface);
}

#ownInput {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  padding: 0 20px;
  font-family: inherit;
  font-size: 16px;
  color: var(--text);
  height: 60px;
}

#ownInput::placeholder {
  color: var(--text-muted);
}

/* Contact Fields */
.contact-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 24px;
}

.contact-field {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-radius: var(--radius);
  background: var(--card);
  border: 2px solid var(--border);
  transition: var(--transition);
}

.contact-field:focus-within {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
}

.contact-icon {
  font-size: 24px;
  min-width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.contact-field input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
}

.contact-field input::placeholder {
  color: var(--text-muted);
}

/* Actions */
.actions-row {
  display: flex;
  gap: 12px;
  margin-top: 32px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 32px;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: var(--transition);
  min-height: 56px;
  flex: 1;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.btn-primary {
  background: linear-gradient(135deg, var(--brand), #0056b3);
  color: white;
  box-shadow: var(--shadow);
}

.btn-ghost {
  background: var(--surface);
  border: 2px solid var(--border);
  color: var(--text);
}

.btn-ghost:hover {
  background: var(--card);
  border-color: var(--brand);
}

/* Error Banner */
.err-banner {
  display: none;
  border-radius: var(--radius);
  background: var(--danger-light);
  border: 1px solid rgba(220,53,69,0.2);
  padding: 16px 20px;
  color: var(--danger);
  font-size: 14px;
  line-height: 1.5;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}

.err-banner.show {
  display: block;
}

/* Sidebar */
.sidebar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 24px 20px;
}

.sidebar-section {
  margin-bottom: 32px;
}

.sidebar-section:last-child {
  margin-bottom: 0;
}

.section-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

/* Brief List */
.brief-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.brief-item {
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 16px 20px;
  box-shadow: var(--shadow);
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.brief-key {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 4px;
}

.brief-val {
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
}

.brief-empty {
  font-size: 16px;
  color: var(--text-muted);
  text-align: center;
  padding: 32px 0;
}

/* Output Area */
.output-area {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.output-box {
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 20px;
  min-height: 200px;
  box-shadow: var(--shadow);
  overflow-y: auto;
}

#output {
  font-family: 'Inter', monospace;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-secondary);
  white-space: pre-wrap;
}

#output.active {
  color: var(--text);
}

#genBtn {
  width: 100%;
  margin-top: 16px;
}

/* Done Banner */
.done-banner {
  padding: 24px;
  border-radius: var(--radius-lg);
  background: var(--success-light);
  border: 1px solid rgba(40,167,69,0.2);
  text-align: center;
  display: none;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
}

.done-banner.show {
  display: block;
}

.done-banner h2 {
  font-size: 24px;
  font-weight: 700;
  color: var(--success);
  margin-bottom: 8px;
}

.done-banner p {
  font-size: 16px;
  color: var(--text-secondary);
}

/* Loading States */
.skeleton {
  border-radius: 8px;
  background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  display: inline-block;
  flex-shrink: 0;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Responsive Design */
@media (min-width: 768px) {
  .app {
    flex-direction: row;
  }

  .main {
    border-right: 1px solid var(--border);
    padding: 48px 40px;
  }

  .sidebar {
    width: 400px;
    border-top: none;
    border-left: 1px solid var(--border);
    padding: 32px;
  }

  .options-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .actions-row {
    flex-direction: row;
  }

  .btn {
    flex: none;
  }
}

@media (min-width: 1024px) {
  .main {
    padding: 64px 56px;
  }

  .sidebar {
    width: 450px;
    padding: 40px;
  }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        <circle cx="9" cy="10" r="1" fill="currentColor"></circle>
        <circle cx="12" cy="10" r="1" fill="currentColor"></circle>
        <circle cx="15" cy="10" r="1" fill="currentColor"></circle>
      </svg>
    </div>
    <span>AdGPT</span>
  </div>
  <div class="topbar-right">
    <div class="status-dot" id="statusPill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Connecting</span>
    </div>
  </div>
</header>

<!-- APP LAYOUT -->
<div class="app">

  <!-- MAIN: INTERVIEW -->
  <main class="main" id="interviewView">
    <!-- Progress -->
    <div class="progress-row">
      <span class="step-label" id="stepLabel">Step 0 / 9</span>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="pct-label" id="pctLabel">0%</span>
    </div>

    <!-- Question -->
    <div class="q-block" id="qBlock">
      <span class="q-tag" id="qTag">Question</span>
      <h1 class="q-text" id="questionText">Loading your first question…</h1>
    </div>

    <!-- Options -->
    <div class="options-grid" id="optionsGrid"></div>

    <!-- Custom answer row -->
    <div class="custom-row">
      <span class="custom-label">Or type</span>
      <input id="ownInput" type="text" placeholder="Write your own answer…" autocomplete="off" />
    </div>

    <!-- Error -->
    <div class="err-banner" id="errBanner"></div>

    <!-- Done state -->
    <div class="done-banner" id="doneBanner">
      <h2>Brief complete ✓</h2>
      <p>All questions answered. Hit generate to create your ad assets.</p>
    </div>

    <!-- Actions -->
    <div class="actions-row">
      <button class="btn btn-ghost" id="backBtn" onclick="onBack()" style="display:none">
        ← Back
      </button>
      <button class="btn btn-primary" id="nextBtn" onclick="onNext()">
        Next Question →
      </button>
      <button class="btn btn-ghost" id="retryBtn" onclick="onRetry()" style="display:none">
        Retry
      </button>
    </div>
  </main>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Live Brief -->
    <div class="sidebar-section">
      <div class="section-title">Your Brief</div>
      <div class="brief-list" id="briefList">
        <div class="brief-empty" id="briefEmpty">Answers will appear here as you go.</div>
      </div>
    </div>

    <!-- Output -->
    <div class="output-area">
      <div class="section-title">Creative Output</div>
      <div class="output-box">
        <pre id="output">Ad copy will appear here once all questions are answered.</pre>
      </div>
      <button class="btn btn-primary" id="genBtn" onclick="onGenerate()" style="display:none; width:100%">
        Generate Ad Assets
      </button>
    </div>

  </aside>
</div>

<script>
const state = {
  answers: {},
  current: null,
  selected: "",
  totalSteps: 6,
  mode: "question", // question | blocked | generate | generating | done
  history: [], // Track order of answered fields for back button
  contactValues: {}, // Store phone, email, whatsapp values temporarily
};

// DOM refs
const stepLabel     = document.getElementById("stepLabel");
const progressFill  = document.getElementById("progressFill");
const pctLabel      = document.getElementById("pctLabel");
const qTag          = document.getElementById("qTag");
const questionText  = document.getElementById("questionText");
const optionsGrid   = document.getElementById("optionsGrid");
const ownInput      = document.getElementById("ownInput");
const errBanner     = document.getElementById("errBanner");
const doneBanner    = document.getElementById("doneBanner");
const backBtn       = document.getElementById("backBtn");
const nextBtn       = document.getElementById("nextBtn");
const retryBtn      = document.getElementById("retryBtn");
const briefList     = document.getElementById("briefList");
const briefEmpty    = document.getElementById("briefEmpty");
const output        = document.getElementById("output");
const genBtn        = document.getElementById("genBtn");
const statusDot     = document.getElementById("statusDot");
const statusText    = document.getElementById("statusText");

function esc(str) {
  return String(str).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

function prettyKey(k) {
  return k.replace(/_/g," ").replace(/\b\w/g, x => x.toUpperCase());
}

function setStatus(state, label) {
  // state: "ok" | "err" | "wait"
  statusDot.className = "dot " + (state === "ok" ? "green" : state === "err" ? "red" : "orange");
  statusText.textContent = label;
}

function setProgress(answered, total) {
  const pct = total ? Math.round((answered / total) * 100) : 0;
  progressFill.style.width = pct + "%";
  pctLabel.textContent = pct + "%";
  stepLabel.textContent = "Step " + answered + " / " + total;
  state.totalSteps = total || state.totalSteps;
}

function renderBrief() {
  const entries = Object.entries(state.answers);
  if (!entries.length) {
    briefEmpty.style.display = "";
    // Remove any existing items (keep briefEmpty)
    Array.from(briefList.children).forEach(c => { if (c !== briefEmpty) c.remove(); });
    return;
  }
  briefEmpty.style.display = "none";
  briefList.innerHTML = "";
  for (const [k, v] of entries) {
    const el = document.createElement("div");
    el.className = "brief-item";
    el.innerHTML = `<span class="brief-key">${esc(prettyKey(k))}</span><span class="brief-val">${esc(v)}</span>`;
    briefList.appendChild(el);
  }
}

function renderOptions(opts) {
  optionsGrid.innerHTML = "";
  if (!opts || !opts.length) return;
  opts.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.innerHTML = `<span class="opt-num">${i+1}</span>${esc(opt)}`;
    btn.onclick = () => {
      state.selected = opt;
      ownInput.value = "";
      document.querySelectorAll(".opt-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
    };
    optionsGrid.appendChild(btn);
  });
}

function renderContactFields() {
  optionsGrid.innerHTML = "";
  const contactGrid = document.createElement("div");
  contactGrid.className = "contact-grid";
  contactGrid.id = "contactGrid";
  
  const contacts = [
    { id: "phone", icon: "📱", label: "Phone", placeholder: "Enter phone number" },
    { id: "email", icon: "📧", label: "Email", placeholder: "Enter email address" },
    { id: "whatsapp", icon: "💬", label: "WhatsApp", placeholder: "Enter WhatsApp number" }
  ];
  
  contacts.forEach(contact => {
    const field = document.createElement("div");
    field.className = "contact-field";
    
    const icon = document.createElement("span");
    icon.className = "contact-icon";
    icon.textContent = contact.icon;
    
    const input = document.createElement("input");
    input.type = contact.id === "email" ? "email" : "text";
    input.id = `contact_${contact.id}`;
    input.name = contact.id;
    input.placeholder = contact.placeholder;
    input.value = state.contactValues?.[contact.id] || "";
    input.addEventListener("input", (e) => {
      if (!state.contactValues) state.contactValues = {};
      state.contactValues[contact.id] = e.target.value;
      ownInput.value = "";
      state.selected = "";
    });
    
    field.appendChild(icon);
    field.appendChild(input);
    contactGrid.appendChild(field);
  });
  
  optionsGrid.appendChild(contactGrid);
}

function showError(msg) {
  errBanner.textContent = msg;
  errBanner.classList.add("show");
}

function clearError() {
  errBanner.textContent = "";
  errBanner.classList.remove("show");
}

function renderOllamaStatus(meta) {
  if (!meta) return;
  const hasError = meta.last_error && meta.last_error.trim();
  const isReady  = meta.enabled && !hasError;
  setStatus(isReady ? "ok" : hasError ? "err" : "wait",
            isReady ? "AI Ready" : hasError ? "AI Error" : "Checking");
}

// ── Question rendering ──
function showQuestion(data) {
  state.current = data;
  state.mode = "question";
  state.selected = "";

  clearError();
  doneBanner.classList.remove("show");
  genBtn.style.display = "none";
  backBtn.style.display = state.history.length > 0 ? "" : "none";
  nextBtn.style.display = "";
  nextBtn.disabled = false;
  nextBtn.innerHTML = "Next Question →";
  retryBtn.style.display = "none";
  ownInput.disabled = false;
  ownInput.value = "";

  const answered = data.answered_steps || 0;
  setProgress(answered, data.total_steps || state.totalSteps);

  qTag.textContent = "Q" + (answered + 1);
  questionText.textContent = data.question;

  // Handle contact fields specially
  if (data.contact_type) {
    renderContactFields();
  } else {
    renderOptions(data.options || []);
  }
  
  renderBrief();
  renderOllamaStatus(data.ollama);
}

function showBlocked(data) {
  state.current = data;
  state.mode = "blocked";

  const answered = data.answered_steps || 0;
  setProgress(answered, data.total_steps || state.totalSteps);

  qTag.textContent = "Error";
  questionText.textContent = "Couldn't generate the next question.";
  optionsGrid.innerHTML = "";
  ownInput.disabled = true;
  ownInput.value = "";

  showError(data.error || "AI model is unavailable. Please retry in a moment.");
  backBtn.style.display = state.history.length > 0 ? "" : "none";
  nextBtn.style.display = "none";
  retryBtn.style.display = "";
  retryBtn.disabled = false;
  retryBtn.textContent = "↺ Retry";
  doneBanner.classList.remove("show");
  genBtn.style.display = "none";

  renderBrief();
  renderOllamaStatus(data.ollama);
  setStatus("err", "AI Error");
}

function showReadyToGenerate(meta) {
  state.mode = "generate";

  setProgress(state.totalSteps, state.totalSteps);
  qTag.textContent = "Done";
  questionText.textContent = "All questions answered!";
  optionsGrid.innerHTML = "";
  ownInput.disabled = true;
  ownInput.value = "";
  clearError();

  doneBanner.classList.add("show");
  backBtn.style.display = "";
  nextBtn.style.display = "none";
  retryBtn.style.display = "none";
  genBtn.style.display = "";
  genBtn.disabled = false;
  genBtn.innerHTML = "✦ Generate Ad Assets";

  renderBrief();
  renderOllamaStatus(meta);
}

// ── API ──
async function api(url, body) {
  const opts = body
    ? { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }
    : { method: "GET" };
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

async function loadNextQuestion() {
  try {
    const data = await api("/api/next_question", { answers: state.answers });
    if (data.done) { showReadyToGenerate(data.ollama); return; }
    if (data.error) { showBlocked(data); return; }
    showQuestion(data);
  } catch (err) {
    showBlocked({
      field: state.current?.field || "unknown",
      label: "Step",
      total_steps: state.totalSteps,
      answered_steps: Object.keys(state.answers).length,
      error: "Could not reach the server. Make sure the backend is running.",
    });
  }
}

async function onNext() {
  // Handle contact fields specially
  if (state.current.field === "contact") {
    const contactValues = state.contactValues || {};
    const hasPhone = contactValues.phone && contactValues.phone.trim();
    const hasEmail = contactValues.email && contactValues.email.trim();
    const hasWhatsApp = contactValues.whatsapp && contactValues.whatsapp.trim();
    
    if (!hasPhone && !hasEmail && !hasWhatsApp) {
      showError("Please provide at least one contact method (phone, email, or WhatsApp).");
      return;
    }
    
    // Format contact details nicely
    const contactDetails = [];
    if (hasPhone) contactDetails.push(`📱 ${contactValues.phone}`);
    if (hasEmail) contactDetails.push(`📧 ${contactValues.email}`);
    if (hasWhatsApp) contactDetails.push(`💬 ${contactValues.whatsapp}`);
    
    clearError();
    state.answers[state.current.field] = contactDetails.join(" | ");
    state.contactValues = {}; // Reset for next time if needed
  } else {
    // Regular field handling
    const custom = ownInput.value.trim();
    const answer = custom || state.selected;
    if (!answer) {
      showError("Please pick an option or type your own answer.");
      return;
    }

    clearError();
    state.answers[state.current.field] = answer;
  }
  
  // Track this field in history if not already there
  if (!state.history.includes(state.current.field)) {
    state.history.push(state.current.field);
  }
  renderBrief();

  nextBtn.disabled = true;
  nextBtn.innerHTML = '<span class="spinner"></span> Loading…';
  questionText.textContent = "Generating next question…";
  optionsGrid.innerHTML = "";
  ownInput.value = "";
  state.selected = "";

  await loadNextQuestion();
}

async function onBack() {
  if (state.history.length === 0) return;
  
  // Remove the last answered question from history and answers
  const lastField = state.history.pop();
  delete state.answers[lastField];
  renderBrief();
  
  backBtn.disabled = true;
  backBtn.innerHTML = '<span class="spinner"></span> Loading…';
  questionText.textContent = "Going back…";
  optionsGrid.innerHTML = "";
  ownInput.value = "";
  state.selected = "";
  clearError();
  
  await loadNextQuestion();
}

async function onRetry() {
  retryBtn.disabled = true;
  retryBtn.textContent = "Retrying…";
  clearError();
  questionText.textContent = "Retrying…";
  await loadNextQuestion();
}

async function onGenerate() {
  state.mode = "generating";
  genBtn.disabled = true;
  genBtn.innerHTML = '<span class="spinner"></span> Generating…';
  output.className = "";
  output.textContent = "Working on your ad assets…";
  setStatus("wait", "Generating");

  try {
    const data = await api("/api/generate_assets", { answers: state.answers });
    renderOllamaStatus(data.ollama);

    if (data.error) {
      output.textContent = "⚠ " + data.error;
      setStatus("err", "Generation failed");
    } else {
      output.textContent = data.output || "No output returned.";
      output.className = "active";
      setStatus("ok", "Done");
    }
  } catch (err) {
    output.textContent = "Could not reach the server. Try again.";
    setStatus("err", "Error");
  }

  state.mode = "generate";
  genBtn.disabled = false;
  genBtn.innerHTML = "↺ Regenerate";
}

// ── Init ──
renderBrief();
loadNextQuestion();
</script>
</body>
</html>
